 <p>Tämä on tavallinen tekstikappale</p>

 <!--Sisäkkäiset elementit-->
<html>
    <head>
        <title>Sivun otsikko</title>
    </head>
    <body>
        <p>Tämä on tekstikappale</p>
    </body>
</html>

Tyhjä elementti: Sisältö ja lopetustägi puuttuvat. Eli sillä on vain

HTML-elementti valitaan sen merkityksen ei ulkoasun perusteella. Esim alla
oleva h1-elementti kertoo sen olevasn sivun pääotsikko.
-->
<h1>Tämä on sivun pääotsikko</h1>
