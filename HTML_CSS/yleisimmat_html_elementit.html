<!--
Yleisimmät HTML-elementit
ELEMENTTI       MERKITYS
h1, ..., h6     otsikko
p               tekstikappale
img             kuva
ul              (pallukka)lista
li              lista-alkio
div ja span        kääre-elementit
-->

<!--
Otsikko (h1, ..., h6)
Otsikkojen ulkoasu muokataan CSS-tyyleillä.
-->
 
<!--
Tekstikappale (p)
Sen ylä ja alapuolella on pieni väli erottamassa sitä muusta sisällöstä
-->

<!--
Kuva (img src="" alt="")
img on tyhjä elementti. Kuva näkyy tyypillisesti sen luonnollisessa koossa.
-->

<!--
Linkki (a)
Linkki toiselle sivulle tai saman sivun toiseen kohtaan.
Linkin osoite määritellään href-määritteellä. Elementin sisältö on
linkkiteksti.
-->

<!--
Lista (ul ja li)
Lista merkataan ul-elementillä. Sen sisällöksi tulee kukin kohta omana
li- elementtinään. Alkioiden alussa on yleensä pallukka, josta tulee nimi
pallukkalista (järjestämätön lista)
Järjestetty (ordered) lista merkataan ol-elementillä
-->

<!--
Lohko- ja sisätason elementit
Lohkotaso:
Alkavat usein uuden rivbin alusta ja niiden jälkeen tulee rivinvaihto.
Esim. Otsikot (h1-h6), tekstikappale (p) ja lista (ul).

Sisätaso:
Eivät ala automaattisesti uuden rivin alusta ja ne eivät päätä riviä.
Toisin sanoen ne voivat sijaita keskellä tekstiä.
Esim. linkki (a) ja kuva (img).
-->

<!--
Kääreet (div ja span)
Eroavat muista edellä esitellyistä elementeistä. Niillä ei ole sisältö- eikä
myöskään ulkoasumerkitystä. Näkymättömiä kehyksiä eli kääreitä.
-->
